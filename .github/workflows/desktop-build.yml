name: Desktop builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows:
    name: Windows GUI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run smoke
      - run: npm run smoke:gui
      - run: npm run build:desktop -- win
      - uses: actions/upload-artifact@v4
        with:
          name: easy-remote-keyboard-windows-gui
          path: release/*.exe

  macos:
    name: macOS GUI
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run smoke
      - run: npm run smoke:gui
      - run: npm run build:desktop -- mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: easy-remote-keyboard-macos-gui
          path: |
            release/*.zip
